<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[400px] flex flex-col items-center">
        
        <!-- Logo & Header -->
        <div class="mb-8 text-center">
            <div class="bg-black w-12 h-12 rounded-xl flex items-center justify-center mb-4 mx-auto">
                <i class="fa-solid fa-wallet text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-1">minimal</h1>
            <p class="text-gray-500 text-sm">Secure wallet authorization</p>
        </div>

        <!-- Form -->
        <form class="w-full space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" placeholder="your@email.com" 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-black transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" placeholder="Enter your password" 
                        class="w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-black transition-all">
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 cursor-pointer">
                        <i class="fa-regular fa-eye text-sm"></i>
                    </span>
                </div>
            </div>

            <div class="text-right">
                <a href="#" class="text-sm text-gray-500 hover:text-black">Forgot password?</a>
            </div>

            <button type="submit" 
                class="w-full bg-[#03030b] text-white py-3.5 rounded-xl font-medium hover:bg-black transition-colors">
                Sign in
            </button>
        </form>

        <p class="mt-6 text-sm text-gray-500">
            Don't have an account? <a href="#" class="text-black font-semibold">Create account</a>
        </p>

        <!-- Divider -->
        <div class="w-full flex items-center my-8">
            <div class="flex-grow border-t border-gray-100"></div>
            <span class="px-3 text-xs text-gray-400 uppercase tracking-wider">or continue with</span>
            <div class="flex-grow border-t border-gray-100"></div>
        </div>

        <!-- Social Buttons -->
        <div class="flex w-full gap-4">
            <button class="flex-1 flex items-center justify-center gap-2 py-3 border border-gray-100 rounded-xl hover:bg-gray-50 transition-colors">
                <i class="fa-brands fa-google text-sm"></i>
                <span class="text-sm font-medium">Google</span>
            </button>
            <button class="flex-1 flex items-center justify-center gap-2 py-3 border border-gray-100 rounded-xl hover:bg-gray-50 transition-colors">
                <i class="fa-brands fa-github text-sm"></i>
                <span class="text-sm font-medium">GitHub</span>
            </button>
        </div>

    </div>

</body>
</html>
